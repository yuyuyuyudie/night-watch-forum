<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>守夜人论坛 - 手机版</title>

  <script>
    (function () {
      var mode = localStorage.getItem("m_forum_theme_mode") || "night";
      document.documentElement.className = "theme-classic mode-" + mode;
      if (mode === "day") {
        document.documentElement.style.background = "#faf9f6";
        document.documentElement.style.color = "#1c1c1e";
      } else {
        document.documentElement.style.background = "#000000";
        document.documentElement.style.color = "#ffffff";
      }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/m/css/m-base.css" />
  <link rel="stylesheet" href="/m/css/m-layout.css" />
  <link rel="stylesheet" href="/m/css/m-pages.css" />
</head>
<body>

  <div id="app" class="theme-classic mode-night">
  <script>
    (function () {
      var mode = localStorage.getItem("m_forum_theme_mode") || "night";
      var app = document.getElementById("app");
      app.classList.remove("mode-day", "mode-night");
      app.classList.add("mode-" + mode);
    })();
  </script>

    <!-- 登录页 -->
    <div id="mLoginPage" class="m-login-page">
      <div class="m-login-box">
        <div class="m-login-logo">
          <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="m-login-title">守夜人论坛</div>
        <div class="m-login-subtitle">Night Watch Forum</div>

        <div class="m-login-avatar-box">
          <img id="mAuthAvatarPreview" src="https://api.dicebear.com/7.x/lorelei/svg?seed=NightWatch" />
        </div>
        <div class="m-login-student-id" id="mAuthPreviewStudentId">请输入学号</div>

        <label class="m-login-label">学号 / 编号</label>
        <input id="mAuthStudentIdInput" class="m-login-input" type="text" placeholder="如：AIMMDDXX / MMDDXXA" />

        <label class="m-login-label">访问码</label>
        <input id="mAuthAccessCodeInput" class="m-login-input" type="password" placeholder="输入访问码" />

        <button id="mLoginAccountBtn" class="m-login-btn m-login-btn-primary">确认登录</button>
        <button id="mGuestLoginBtn" class="m-login-btn m-login-btn-ghost">游客登录（无身份组）</button>

        <div class="m-login-tip">白名单制，无账号可联系管理员</div>
      </div>
    </div>

    <!-- 顶部导航 -->
    <header class="m-header">
      <div class="m-header-left">
        <button class="m-icon-btn" id="mBackBtn" style="display:none;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <button class="m-icon-btn" id="mSearchBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
      <div class="m-header-title" id="mHeaderTitle">守夜人论坛</div>
      <div class="m-header-right">
        <button class="m-icon-btn" id="mThemeToggleBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
    </header>

    <main class="m-content" id="mContent"></main>

    <nav class="m-tab-bar" id="mTabBar">
      <button class="m-tab active" data-tab="home">
        <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>首页</span>
      </button>
      <button class="m-tab" data-tab="archive">
        <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span>档案</span>
      </button>
      <button class="m-tab m-tab-center" data-tab="post">
        <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>发帖</span>
      </button>
      <button class="m-tab" data-tab="message">
        <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5a8.5 8.5 0 0 1 4.7-7.6h.5a8.5 8.5 0 0 1 8 8z"/></svg>
        <span>消息</span>
      </button>
      <button class="m-tab" data-tab="setting">
        <svg class="m-tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>设置</span>
      </button>
    </nav>

    <div class="m-bottom-reply" id="mBottomReply" style="display:none;">
  <input type="text" id="mReplyInput" placeholder="写下你的回复..." />
  <button id="mReplySendBtn">发送</button>
</div>
<div class="m-bottom-publish" id="mBottomPublish" style="display:none;">
  <button id="mPostSubmit">发布帖子</button>
</div>

<div class="m-bottom-chat" id="mBottomChat" style="display:none;">
  <input type="text" id="mChatInput" placeholder="输入消息..." />
  <button id="mChatSendBtn">发送</button>
</div>

  </div>

  <script src="/m/js/m-main.js"></script>
</body>
</html>
